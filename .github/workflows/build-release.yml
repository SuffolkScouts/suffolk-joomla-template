name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can push the update_endpoint.xml update back
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update update_endpoint.xml
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import os, textwrap

          version = os.environ['VERSION']
          tag     = os.environ['TAG']
          url     = f'https://github.com/SuffolkScouts/suffolk-joomla-template/releases/download/{tag}/tpl_suffolkscouts.zip'

          new_entry = textwrap.dedent(f"""\
              <update>
                  <name>Suffolk Scouts</name>
                  <description>Suffolk Scouts Joomla Template</description>
                  <element>suffolkscouts</element>
                  <type>template</type>
                  <version>{version}</version>
                  <client>site</client>
                  <downloads>
                      <downloadurl type="full" format="zip">{url}</downloadurl>
                  </downloads>
                  <targetplatform name="joomla" version="4\.*"/>
              </update>""")

          with open('update_endpoint.xml', 'r') as f:
              content = f.read()

          content = content.replace('<updates>', '<updates>\n\t' + new_entry.replace('\n', '\n\t'), 1)

          with open('update_endpoint.xml', 'w') as f:
              f.write(content)
          PYEOF

      - name: Commit updated update_endpoint.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update_endpoint.xml
          git commit -m "Release ${{ github.ref_name }}: update update_endpoint.xml"
          git push origin HEAD:main

      - name: Zip up the template
        run: zip -r tpl_suffolkscouts.zip . -x@.releaseignore

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: tpl_suffolkscouts.zip
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
